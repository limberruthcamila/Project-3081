<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro con Verificación</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

<div class="card">

<h2 id="title">Crear cuenta</h2>

<!-- CREAR CUENTA -->

<div id="crearCuenta">

<button id="googleLogin" class="google-btn">
Continuar con Google
</button>

<p class="switch" id="irLogin">
Ya tengo cuenta
</p>

</div>

<!-- LOGIN OCULTO -->

<div id="loginBox" class="hidden">

<p>Iniciar sesión</p>

<input type="email" id="emailLogin" placeholder="Correo">

<input type="password" id="passLogin" placeholder="Contraseña">

<button id="loginBtn">Ingresar</button>

<p class="switch" id="volverCrear">
Crear cuenta
</p>

</div>

<!-- VERIFICACIÓN -->

<div id="verificationBox" class="hidden">

<p>Ingresa el código de verificación</p>

<input type="text" id="codigoInput" maxlength="6">

<button id="verificarBtn">Verificar</button>

</div>

<p id="mensaje"></p>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>

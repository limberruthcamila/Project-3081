<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LRCFlow - Panel de Administración</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Login Admin Screen */
    .admin-login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
    }
    .admin-login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
      text-align: center;
    }
    .admin-login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .admin-login-logo svg { width: 40px; height: 40px; }
    .admin-login-logo span { font-size: 22px; font-weight: 800; color: #1e293b; }
    .admin-login-badge {
      display: inline-block;
      background: #f59e0b;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
      margin-bottom: 28px;
    }
    .admin-login-card h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 6px;
    }
    .admin-login-card p {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .btn-google-admin {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .btn-google-admin:hover { border-color: #3b82f6; background: #f8faff; }
    .btn-google-admin svg { width: 22px; height: 22px; }
    .admin-login-footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #f1f5f9;
    }
    .btn-visit-site {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #64748b;
      font-size: 13px;
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
      text-decoration: none;
    }
    .btn-visit-site:hover { color: #3b82f6; }
    .admin-error-msg {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

  <!-- LOGIN ADMIN -->
  <div id="adminLoginScreen" class="admin-login-screen" style="display:none;">
    <div class="admin-login-card">
      <div class="admin-login-logo">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="10" fill="#3b82f6"/>
          <path d="M12 28V12h8c2.2 0 4 .8 5 2s1.5 2.8 1.5 4.5c0 1.2-.3 2.3-.8 3.2-.6.9-1.3 1.6-2.3 2l3.6 4.3h-4l-3.2-4H15.5V28H12zm3.5-7h4.3c1 0 1.8-.3 2.4-.9.6-.6.8-1.4.8-2.4s-.3-1.7-.8-2.3c-.6-.5-1.4-.8-2.4-.8h-4.3v6.4z" fill="white"/>
        </svg>
        <span>LRCFlow</span>
      </div>
      <div class="admin-login-badge">ADMIN</div>
      <h2>Acceso Administrador</h2>
      <p>Inicia sesión con tu cuenta autorizada para acceder al panel</p>
      <div class="admin-error-msg" id="adminErrorMsg"></div>
      <button class="btn-google-admin" onclick="adminLoginGoogle()">
        <svg viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Iniciar sesión con Google
      </button>
      <div class="admin-login-footer">
        <a href="index.html" class="btn-visit-site">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          Visitar página principal
        </a>
      </div>
    </div>
  </div>

  <!-- PANEL ADMIN (oculto hasta verificar) -->
  <div class="admin-layout" id="adminPanel" style="display:none;">
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="10" fill="#3b82f6"/>
          <path d="M12 28V12h8c2.2 0 4 .8 5 2s1.5 2.8 1.5 4.5c0 1.2-.3 2.3-.8 3.2-.6.9-1.3 1.6-2.3 2l3.6 4.3h-4l-3.2-4H15.5V28H12zm3.5-7h4.3c1 0 1.8-.3 2.4-.9.6-.6.8-1.4.8-2.4s-.3-1.7-.8-2.3c-.6-.5-1.4-.8-2.4-.8h-4.3v6.4z" fill="white"/>
          <path d="M20 32l4-3h-8l4 3z" fill="white" opacity="0.6"/>
        </svg>
        <span>LRCFlow</span>
        <span class="admin-badge">Admin</span>
      </div>
      <nav class="admin-nav">
        <div class="nav-label">General</div>
        <button class="nav-item active" onclick="showAdminSection('dashboard',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </button>
        <button class="nav-item" onclick="showAdminSection('usuarios',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          Usuarios
        </button>
        <div class="nav-label">Gestión</div>
        <button class="nav-item" onclick="showAdminSection('codigos',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Códigos de Activación
        </button>
        <button class="nav-item" onclick="showAdminSection('planes',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          Planes y Precios
        </button>
        <button class="nav-item" onclick="showAdminSection('mensajes',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Mensajes
        </button>
        <button class="nav-item" onclick="showAdminSection('config',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          Configuración
        </button>
        <div class="nav-label">Sistema</div>
        <button class="nav-item" onclick="showAdminSection('errores',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Errores y Reportes
        </button>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html" class="nav-item" style="color:rgba(255,255,255,0.6);text-decoration:none;display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;font-size:14px;margin-bottom:6px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          Visitar Página
        </a>
        <button class="nav-item" onclick="window.location.href='app.html'" style="color:rgba(255,255,255,0.5)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Volver al Sistema
        </button>
        <button class="btn-logout" onclick="adminLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Cerrar Sesión
        </button>
      </div>
    </aside>

    <div class="admin-content">
      <div class="admin-topbar">
        <div class="flex items-center gap-2">
          <button class="mobile-toggle" onclick="toggleMobileSidebar()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 id="adminTitle">Panel de Administración</h1>
        </div>
        <div class="topbar-date" id="currentDate"></div>
      </div>
      <div class="admin-area" id="adminArea"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="admin.js"></script>
</body>
</html>
